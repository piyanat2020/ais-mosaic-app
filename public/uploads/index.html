<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Photo</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .btn { background: #87C042; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        input { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>ส่งรูปขึ้นจอ AIS</h1>
    <input type="file" id="fileInput" accept="image/*">
    <br>
    <button class="btn" onclick="uploadPhoto()">ส่งรูปภาพ</button>

    <script>
        function uploadPhoto() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return alert('กรุณาเลือกรูปภาพ');

            const formData = new FormData();
            formData.append('photo', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if(response.ok) {
                    alert('ส่งรูปเรียบร้อย!');
                    fileInput.value = ''; // ล้างค่า
                } else {
                    alert('เกิดข้อผิดพลาด');
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
