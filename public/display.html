<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AIS Display 900 Pixels</title>
    <style>
        body { 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* ป้องกัน Scrollbar */
        }
        
        /* Grid ขนาด 45x20 = 900 ช่อง */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(45, 1fr); /* 45 คอลัมน์ */
            grid-template-rows: repeat(20, 1fr);    /* 20 แถว */
            gap: 2px; /* ช่องว่างเล็กลงเพื่อให้ดูเนียนขึ้น */
            width: 95vw;
            height: 90vh;
        }

        .pixel {
            background-color: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
            opacity: 0.15; /* จางมากถ้าไม่ใช่ตัวอักษร */
            transition: all 0.5s;
            position: relative;
        }

        /* Class สำหรับช่องที่เป็นตัวอักษร AIS */
        .pixel.active {
            background-color: #333;
            opacity: 0.4; /* สว่างขึ้นมารอนูป */
            box-shadow: 0 0 5px rgba(135, 192, 66, 0.2); /* เรืองแสงสีเขียว AIS นิดๆ */
        }

        /* เมื่อมีรูปภาพใส่เข้ามา */
        .pixel.has-image {
            opacity: 1 !important;
            background-color: black;
        }

        .pixel img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ตัดส่วนเกินออกให้รูปเต็มช่อง */
            display: block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { 
            from { transform: scale(0); } 
            to { transform: scale(1); } 
        }
    </style>
</head>
